name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  KOI_NO_CREDENTIAL_STORE: "1"

# Least privilege: every job only reads the repo. No job creates checks, issues,
# or releases, so the GITHUB_TOKEN never needs write scope.
permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}

      - name: Build
        run: cargo build --locked

      - name: Test
        run: cargo test --locked

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy --locked -- -D warnings

  lean:
    name: lean-embedded (optional backends off)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # Prove the feature gates compile with their optional backends removed (so the
      # not(feature) arms / stubs don't bit-rot), and that the propagation through
      # koi-embedded still builds lean.
      - name: Build leaf crates without default features
        run: |
          cargo build --locked -p koi-runtime --no-default-features
          cargo build --locked -p koi-crypto --no-default-features
          cargo build --locked -p koi-embedded --no-default-features

      # Prove a lean consumer actually sheds bollard / keyring / image (the real win) —
      # from an external probe, robust to workspace feature unification.
      - name: Lean dependency-closure tripwire
        run: bash scripts/check-lean-embedded.sh

      # Catch a new publishable crate that was added to the workspace but not to
      # publish.yml's CRATES list (the koi-dashboard / 0.4.0 partial-publish incident).
      - name: Publish-list completeness
        run: bash scripts/check-publish-list.sh

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Format check
        run: cargo fmt --check

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.92
      - uses: Swatinem/rust-cache@v2
      - name: Check (MSRV)
        run: cargo check --locked

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit
        # Audits the committed Cargo.lock. Fails on security vulnerabilities and
        # reports unmaintained/unsound advisories. No GITHUB_TOKEN / API needed,
        # so this also works for pull requests from forks.
        run: cargo audit

  surfaces:
    # Surface-ledger tripwire (Epic E02): docs/SURFACES.md must exist and parse.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint surface ledger
        run: bash scripts/lint-surfaces.sh docs/SURFACES.md
