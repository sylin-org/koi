name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  KOI_NO_CREDENTIAL_STORE: "1"

# Least privilege: every job only reads the repo. No job creates checks, issues,
# or releases, so the GITHUB_TOKEN never needs write scope.
permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}

      - name: Build
        run: cargo build --locked

      - name: Test
        run: cargo test --locked

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy --locked -- -D warnings

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Format check
        run: cargo fmt --check

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.92
      - uses: Swatinem/rust-cache@v2
      - name: Check (MSRV)
        run: cargo check --locked

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit
        # Audits the committed Cargo.lock. Fails on security vulnerabilities;
        # unmaintained-crate notices (paste, number_prefix, rustls-pemfile) are
        # informational warnings, not failures. No GITHUB_TOKEN / API needed, so
        # this also works for pull requests from forks.
        run: cargo audit

  surfaces:
    # Surface-ledger tripwire (Epic E02): docs/SURFACES.md must exist and parse.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint surface ledger
        run: bash scripts/lint-surfaces.sh docs/SURFACES.md
