name: Release

on:
  push:
    tags:
      - 'v*'
  # Build-only dry run: validates the full cross-compile matrix (incl. the
  # aws-lc-sys musl/aarch64 builds) WITHOUT creating a release. The `release`
  # job is gated on a tag push, so a manual dispatch runs prepare+test+build only.
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: koi

jobs:
  # ── Prepare ───────────────────────────────────────────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      description: ${{ steps.meta.outputs.description }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version metadata
        id: meta
        shell: bash
        run: |
          VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          TAG="v${VERSION}"
          # Release description is the body of the latest CHANGELOG.md section
          # (everything between the first "## [" heading and the next one).
          DESCRIPTION=$(awk '/^## \[/{c++; if(c==2) exit; next} c==1' CHANGELOG.md)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          {
            echo "description<<__KOI_EOF__"
            echo "$DESCRIPTION"
            echo "__KOI_EOF__"
          } >> "$GITHUB_OUTPUT"
          echo "Tag: $TAG"
          echo "Version: $VERSION"
          echo "Description:"
          echo "$DESCRIPTION"

  # ── Test ──────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test
        run: cargo test --locked

  # ── Build ─────────────────────────────────────────────────────────
  # Runs in parallel with `test` (not gated on it) so the 6 cross builds and the
  # ~6-min test suite overlap. `release` still requires `test` to pass, so a broken
  # commit never produces a GitHub Release or a crates.io publish.
  build:
    needs: [prepare]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            use_cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            use_cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            use_cross: false
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            use_cross: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --locked --target ${{ matrix.target }}
          else
            cargo build --release --locked --target ${{ matrix.target }}
          fi

      - name: Package
        shell: bash
        run: |
          VERSION="${{ needs.prepare.outputs.tag }}"
          TARGET="${{ matrix.target }}"
          ARCHIVE_DIR="${BIN_NAME}-${VERSION}-${TARGET}"
          mkdir "$ARCHIVE_DIR"

          # Copy binary
          BIN_SUFFIX=""
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            BIN_SUFFIX=".exe"
          fi
          cp "target/${TARGET}/release/${BIN_NAME}${BIN_SUFFIX}" "$ARCHIVE_DIR/"

          # Copy docs and licenses
          cp README.md "$ARCHIVE_DIR/" 2>/dev/null || true
          cp LICENSE* "$ARCHIVE_DIR/" 2>/dev/null || true

          # Create archive
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            7z a "${ARCHIVE_DIR}.zip" "$ARCHIVE_DIR"
            echo "ASSET=${ARCHIVE_DIR}.zip" >> "$GITHUB_ENV"
          else
            tar czf "${ARCHIVE_DIR}.tar.gz" "$ARCHIVE_DIR"
            echo "ASSET=${ARCHIVE_DIR}.tar.gz" >> "$GITHUB_ENV"
          fi

      - name: Checksum
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            sha256sum "${{ env.ASSET }}" > "${{ env.ASSET }}.sha256"
          else
            shasum -a 256 "${{ env.ASSET }}" > "${{ env.ASSET }}.sha256"
          fi
          cat "${{ env.ASSET }}.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            ${{ env.ASSET }}
            ${{ env.ASSET }}.sha256

  # ── Release ───────────────────────────────────────────────────────
  release:
    needs: [prepare, test, build]
    # Only create a GitHub Release on a real tag push; workflow_dispatch runs
    # the build matrix as a dry run and stops here.
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: release-*
          merge-multiple: true

      - name: Generate release notes
        shell: bash
        env:
          # Pass via env: — env values are NOT re-parsed by bash, so backticks
          # and $() in the CHANGELOG body cannot trigger command substitution.
          # (Interpolating ${{ }} directly into a quoted assignment crashed this
          # step with exit 127 on any backtick in the notes.)
          VERSION: ${{ needs.prepare.outputs.tag }}
          DESCRIPTION: ${{ needs.prepare.outputs.description }}
        run: |
          # Read the template and substitute
          TEMPLATE=$(cat .github/release-template.md)
          NOTES="${TEMPLATE//\$\{VERSION\}/$VERSION}"
          # Bare (no leading v) version — matches the docker image tag, which
          # docker/metadata-action publishes as {{version}} (the v is stripped).
          VERSION_NO_V="${VERSION#v}"
          NOTES="${NOTES//\$\{VERSION_NO_V\}/$VERSION_NO_V}"
          NOTES="${NOTES//\$\{DESCRIPTION\}/$DESCRIPTION}"

          # Build checksums table
          CHECKSUMS=""
          for f in artifacts/*.sha256; do
            HASH=$(cut -d' ' -f1 "$f")
            FILE=$(basename "${f%.sha256}")
            CHECKSUMS="${CHECKSUMS}${HASH}  ${FILE}"$'\n'
          done
          NOTES="${NOTES//\$\{CHECKSUMS\}/$CHECKSUMS}"

          echo "$NOTES" > release-notes.md
          echo "--- Release notes ---"
          cat release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file release-notes.md \
            artifacts/*

  # ── Container image (GHCR) ─────────────────────────────────────────
  # Multi-arch image assembled from the exact musl binaries the `build` job
  # produced — no compile-in-Docker. Gated on `test` so a broken commit never
  # ships an image, and on a real tag push so the workflow_dispatch dry run does
  # not publish. Needs only the built-in GITHUB_TOKEN (packages: write).
  docker:
    needs: [prepare, test, build]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Download linux build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: release-*-unknown-linux-musl
          merge-multiple: true

      - name: Stage binaries for buildx
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ needs.prepare.outputs.tag }}"
          # buildx arch (amd64/arm64) ← release triple (x86_64/aarch64-...-musl)
          for pair in "amd64:x86_64" "arm64:aarch64"; do
            docker_arch="${pair%%:*}"
            cpu="${pair##*:}"
            triple="${cpu}-unknown-linux-musl"
            tar xzf "artifacts/${BIN_NAME}-${TAG}-${triple}.tar.gz"
            cp "${BIN_NAME}-${TAG}-${triple}/${BIN_NAME}" "docker/release/koi-${docker_arch}"
          done
          chmod +x docker/release/koi-*
          ls -l docker/release/

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(needs.prepare.outputs.tag, '-') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: docker/release
          file: docker/release/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true

  # ── Publish to crates.io ──────────────────────────────────────────
  # Runs only after the GitHub Release succeeds (which requires all 6 cross
  # builds + tests to pass), and only on a real tag push — so a broken tag never
  # reaches the irreversible crates.io publish, and the workflow_dispatch dry run
  # never publishes. Reuses publish.yml (rate-limit bucketing + index verify).
  publish-crates:
    needs: [release]
    if: startsWith(github.ref, 'refs/tags/')
    uses: ./.github/workflows/publish.yml
    secrets: inherit
