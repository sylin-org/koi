# Koi Workflow Dependency Bump And Verification

## Action

Follow the dependency-bump-and-verification workflow:
1. Update version(s) in Cargo.toml for affected crate(s).
2. Run cargo update to refresh Cargo.lock.
3. Verify the code compiles (cargo build --all-targets).
4. Run lints (clippy -D warnings).
5. Run tests for affected crates.
6. Update documentation references to dependency versions if needed.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~4x per month
- Files: Cargo.toml, Cargo.lock, crates/*/Cargo.toml

