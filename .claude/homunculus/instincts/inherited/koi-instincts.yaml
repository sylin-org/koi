# Koi Workflow Epic Feature Development With Plan And Ledger

## Action

Follow the epic-feature-development-with-plan-and-ledger workflow:
1. Write or update a plan/acceptance doc in docs/prompts/plans/ (goal, file list, tests, risks).
2. Implement or refactor code across multiple files/crates.
3. Update or add documentation (README, guides, API docs).
4. Update progress/acceptance ledger (docs/prompts/PROGRESS.md).
5. Update reference docs if APIs or utilities change.
6. Add or update tests for new/refactored code.
7. Cross-link in .agentic/CONTEXT.md or similar context files.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: docs/prompts/plans/*.md, docs/prompts/PROGRESS.md, crates/*/*.rs

